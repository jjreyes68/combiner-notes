<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Room v3</title>
<style>
/* ===== Visual Tone Refresh: calmer, professional ops ===== */
:root{
  --bg:#0f1115;--bg2:#151820;--bg3:#1c202a;--bg4:#232838;
  --border:#2b3042;--border2:#3a4060;
  --text:#e6e9f2;--text2:#a5acc2;--text3:#6f7690;
  --green:#4fd39c;--green-dim:#173a2b;
  --amber:#f3b34a;--amber-dim:#3a2a12;
  --red:#ef6b6b;--red-dim:#3a1616;
  --blue:#6aa3ff;--blue-dim:#122547;
  --purple:#a58bff;--purple-dim:#231b45;
  --font:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu;
  --mono:ui-monospace,SFMono-Regular,Menlo,Consolas;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.nav{display:flex;gap:4px;align-items:center;padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap}
.nav-brand{font-family:var(--mono);font-size:12px;color:var(--green);letter-spacing:.06em}
.nav-tab{padding:6px 12px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--text2);cursor:pointer}
.nav-tab:hover{background:var(--bg3);color:var(--text)}
.nav-tab.active{background:var(--bg3);border-color:var(--border2);color:var(--text)}
.nav-spacer{flex:1}
.nav-time{font-family:var(--mono);font-size:11px;color:var(--text3)}

.view{display:none;padding:14px}
.view.active{display:block}

/* Generic UI */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px}
.card-title{font-size:11px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}

.tbtn{padding:6px 12px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);cursor:pointer}
.tbtn:hover{border-color:var(--blue);color:var(--blue)}
.btn-primary{padding:7px 16px;border-radius:6px;border:1px solid var(--green);background:var(--green-dim);color:var(--green);cursor:pointer}
.btn-primary:hover{background:var(--green);color:#000}
.btn-danger{padding:6px 14px;border-radius:6px;border:1px solid var(--red-dim);background:transparent;color:var(--red);cursor:pointer}
.btn-danger:hover{background:var(--red-dim)}

.empty{font-size:12px;color:var(--text3);padding:14px;text-align:center}

/* Layout helpers */
.cols3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
@media(max-width:900px){.cols3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.cols3{grid-template-columns:1fr}}
  /* ===== Notepad: full-focus editor ===== */
.notes-layout{display:grid;grid-template-columns:260px 1fr;gap:10px;min-height:70vh}
@media(max-width:900px){
  .notes-layout{grid-template-columns:1fr}
  .notes-sidebar{display:none}
}
.notes-sidebar{display:flex;flex-direction:column;gap:6px}
.notes-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.note-entry{padding:8px 10px;border-radius:6px;background:var(--bg3);cursor:pointer}
.note-entry.active{outline:2px solid var(--blue-dim)}
.note-ts{font-size:10px;color:var(--text3);font-family:var(--mono)}
.note-title{font-size:12px;font-weight:500}

.note-editor{display:flex;flex-direction:column;gap:8px}
.note-editor textarea{
  flex:1;min-height:55vh;background:var(--bg2);
  border:1px solid var(--border);border-radius:10px;
  padding:14px;font-family:var(--mono);color:var(--text);font-size:14px
}

/* ===== Scans Timer (moved from Ops) ===== */
.timer-strip{display:flex;gap:10px;align-items:center;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:12px;flex-wrap:wrap}
.timer-big{font-family:var(--mono);font-size:28px;color:var(--green)}
.timer-bar{flex:1;min-width:120px;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden}
.timer-fill{height:100%;background:var(--green)}
  </style>
</head>
<body>

<div class="nav">
  <div class="nav-brand">CTRL ROOM</div>
  <button class="nav-tab active" onclick="switchView('notepad',this)">Notepad</button>
  <button class="nav-tab" onclick="switchView('scans',this)">Scans</button>
  <button class="nav-tab" onclick="switchView('ops',this)">Ops</button>
  <button class="nav-tab" onclick="switchView('log',this)">Log</button>
  <button class="nav-tab" onclick="switchView('intel',this)">Ops Intelligence</button>
  <div class="nav-spacer"></div>
  <div class="nav-time" id="nav-clock"></div>
</div>

<!-- NOTEPAD -->
<div class="view active" id="view-notepad">
  <div class="notes-layout">
    <div class="notes-sidebar">
      <button class="tbtn" onclick="newNote()">+ New note</button>
      <div class="notes-list" id="notes-list"></div>
    </div>
    <div class="card note-editor">
      <input id="note-title" placeholder="Note title..." class="tbtn">
      <textarea id="note-body" placeholder="Write here..."></textarea>
      <div style="display:flex;gap:8px">
        <button class="btn-primary" onclick="saveNote()">Save</button>
        <button class="btn-danger" onclick="deleteNote()">Delete</button>
      </div>
    </div>
  </div>
</div>

<!-- SCANS -->
<div class="view" id="view-scans">
  <div class="timer-strip">
    <div class="timer-big" id="scan-timer">30:00</div>
    <div class="timer-bar"><div class="timer-fill" id="scan-fill" style="width:100%"></div></div>
    <button class="tbtn" onclick="toggleScanTimer()">Start</button>
    <button class="tbtn" onclick="resetScanTimer()">Reset</button>
  </div>
  <div id="sites"></div>
</div>
<!-- OPS -->
<div class="view" id="view-ops">
  <div class="cols3">
    <div class="card">
      <div class="card-title">Recurring Tasks</div>
      <div id="recurring"></div>
    </div>
    <div class="card">
      <div class="card-title">Ad‑hoc Tasks</div>
      <div id="adhoc"></div>
    </div>
    <div class="card">
      <div class="card-title">Checklists</div>
      <div style="font-size:12px;color:var(--text3);margin-bottom:6px">Edit mode required to delete</div>
      <div id="checklists"></div>
    </div>
  </div>
</div>

<!-- LOG -->
<div class="view" id="view-log">
  <div id="log"></div>
</div>

<!-- OPS INTELLIGENCE -->
<div class="view" id="view-intel">
  <div class="cols3">
    <div class="card">
      <div class="card-title">Attention Queue</div>
      <div id="intel-attention"></div>
    </div>
    <div class="card">
      <div class="card-title">Shift Load</div>
      <div id="intel-load"></div>
    </div>
    <div class="card">
      <div class="card-title">Upcoming Scans</div>
      <div id="intel-scans"></div>
    </div>
  </div>
</div>
<script>
const SK='ctrlroom_onefile';
const DEFAULT_NOTES_TEMPLATES=[
  {id:'obs',name:'Observation'},
  {id:'incident',name:'Incident'},
  {id:'handoff',name:'Shift Handoff'}
];
let S={
  notes:[],
  activeNote:null,
  scanTimer:{running:false,elapsed:0},
  logs:[]
};

function save(){localStorage.setItem(SK,JSON.stringify(S))}
function load(){try{const x=JSON.parse(localStorage.getItem(SK));if(x)S=x}catch(e){}}
function clock(){nav-clock.textContent=new Date().toLocaleTimeString()}
setInterval(clock,1000);clock()

function switchView(v,el){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'))
  document.getElementById('view-'+v).classList.add('active')
  document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'))
  el.classList.add('active')
}

/* Notes */
function newNote(){const id=Date.now();S.notes.unshift({id,title:'New note',body:'',ts:id});S.activeNote=id;save();renderNotes()}
function saveNote(){const n=S.notes.find(x=>x.id===S.activeNote);if(!n)return;n.title=note-title.value;n.body=note-body.value;save();renderNotes()}
function deleteNote(){S.notes=S.notes.filter(x=>x.id!==S.activeNote);S.activeNote=null;save();renderNotes()}
function renderNotes(){
  const el=document.getElementById('notes-list')
  el.innerHTML=S.notes.map(n=>`<div class="note-entry ${n.id===S.activeNote?'active':''}" onclick="selectNote(${n.id})">
    <div class="note-ts">${new Date(n.ts).toLocaleString()}</div>
    <div class="note-title">${n.title}</div>
  </div>`).join('')||'<div class="empty">No notes</div>'
}
function selectNote(id){
  S.activeNote=id;
  const n=S.notes.find(x=>x.id===id);if(!n)return;
  note-title.value=n.title;note-body.value=n.body;
  renderNotes()
}
  /* Scan Timer */
const TOTAL=1800;let scanInt=null;
function toggleScanTimer(){
  if(S.scanTimer.running){clearInterval(scanInt);S.scanTimer.running=false}
  else{
    S.scanTimer.running=true;
    scanInt=setInterval(()=>{
      S.scanTimer.elapsed++;
      if(S.scanTimer.elapsed>=TOTAL){addLog('30‑minute scan complete');S.scanTimer.elapsed=0}
      updateTimer();save()
    },1000)
  }
}
function resetScanTimer(){S.scanTimer.elapsed=0;updateTimer();save()}
function updateTimer(){
  const rem=TOTAL-S.scanTimer.elapsed;
  scan-timer.textContent=`${Math.floor(rem/60).toString().padStart(2,'0')}:${(rem%60).toString().padStart(2,'0')}`;
  scan-fill.style.width=(rem/TOTAL*100)+'%';
}

/* Logs */
function addLog(msg){S.logs.unshift({ts:Date.now(),msg});renderLog()}
function renderLog(){log.innerHTML=S.logs.map(l=>`<div>${new Date(l.ts).toLocaleString()} — ${l.msg}</div>`).join('')}

load();renderNotes();updateTimer();
</script>
</body>
</html>
