
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Room v2</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0f11;--bg2:#16181c;--bg3:#1e2126;--bg4:#252930;--border:#2e3138;--border2:#3a3f4a;--text:#e8eaf0;--text2:#9199a8;--text3:#5a6070;--green:#2ecc8a;--green-dim:#1a3d2e;--amber:#f0a500;--amber-dim:#3a2800;--red:#e85555;--red-dim:#3a1515;--blue:#4d9eff;--blue-dim:#0d2240;--purple:#9b7fff;--purple-dim:#221a40;--font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh;}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.nav{display:flex;align-items:center;gap:3px;padding:7px 12px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.nav-brand{font-family:var(--mono);font-size:12px;color:var(--green);margin-right:8px;letter-spacing:.05em;white-space:nowrap;}
.nav-tab{padding:5px 12px;border-radius:5px;font-size:13px;color:var(--text2);cursor:pointer;border:none;background:transparent;font-family:var(--font);transition:all .15s;white-space:nowrap;}
.nav-tab:hover{background:var(--bg3);color:var(--text);}
.nav-tab.active{background:var(--bg3);color:var(--text);border:1px solid var(--border2);}
.nav-spacer{flex:1;}
.nav-time{font-family:var(--mono);font-size:11px;color:var(--text3);}
.view{display:none;padding:14px;}
.view.active{display:block;}
/* TIMER */
.timer-strip{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:12px;flex-wrap:wrap;}
.timer-big{font-family:var(--mono);font-size:26px;font-weight:500;color:var(--green);min-width:65px;}
.timer-big.urgent{color:var(--red);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.timer-bar-wrap{flex:1;min-width:80px;height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;}
.timer-bar-fill{height:100%;background:var(--green);border-radius:3px;transition:width 1s linear;}
.timer-bar-fill.urgent{background:var(--red);}
.cycles-badge{font-family:var(--mono);font-size:11px;color:var(--text3);white-space:nowrap;}
/* GRID */
.cols3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
@media(max-width:800px){.cols3{grid-template-columns:1fr 1fr;}}
@media(max-width:500px){.cols3{grid-template-columns:1fr;}}
/* CARD */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px;}
.card-title{font-size:11px;font-weight:500;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;}
/* BUTTONS */
.tbtn{padding:5px 12px;border-radius:5px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:12px;cursor:pointer;font-family:var(--font);}
.tbtn:hover{border-color:var(--green);color:var(--green);}
.tbtn.active-btn{border-color:var(--green);color:var(--green);}
.btn-primary{padding:6px 16px;background:var(--green-dim);border:1px solid var(--green);border-radius:5px;color:var(--green);font-size:13px;cursor:pointer;font-family:var(--font);}
.btn-primary:hover{background:var(--green);color:#000;}
.btn-cancel{padding:6px 16px;background:transparent;border:1px solid var(--border2);border-radius:5px;color:var(--text2);font-size:13px;cursor:pointer;font-family:var(--font);}
.btn-cancel:hover{border-color:var(--text2);color:var(--text);}
.btn-danger{padding:6px 14px;background:transparent;border:1px solid var(--red-dim);border-radius:5px;color:var(--red);font-size:12px;cursor:pointer;font-family:var(--font);}
.btn-danger:hover{background:var(--red-dim);}
.btn-amber{padding:5px 12px;border-radius:5px;border:1px solid var(--amber-dim);background:transparent;color:var(--amber);font-size:12px;cursor:pointer;font-family:var(--font);}
.btn-amber:hover{background:var(--amber-dim);}
/* TASKS */
.task-item{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:5px;background:var(--bg3);margin-bottom:4px;}
.task-cb{width:14px;height:14px;accent-color:var(--green);cursor:pointer;flex-shrink:0;}
.task-label{flex:1;font-size:13px;color:var(--text);}
.task-item.done .task-label{text-decoration:line-through;color:var(--text3);}
.task-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:13px;padding:0 2px;}
.task-del:hover{color:var(--red);}
.rec-badge{font-size:10px;padding:2px 6px;border-radius:10px;font-weight:500;background:var(--green-dim);color:var(--green);white-space:nowrap;}
.rec-badge.done{background:var(--bg4);color:var(--text3);}
.add-row{display:flex;gap:5px;margin-top:7px;}
.add-row input{flex:1;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:6px 9px;color:var(--text);font-family:var(--font);font-size:13px;}
.add-row input:focus{outline:none;border-color:var(--green);}
.add-row button{padding:5px 11px;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;color:var(--green);font-size:13px;cursor:pointer;font-family:var(--font);}
.add-row button:hover{border-color:var(--green);background:var(--green-dim);}
/* CHECKLIST */
.cl-tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px;}
.cl-tab{font-size:11px;padding:2px 9px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);cursor:pointer;}
.cl-tab.active{border-color:var(--blue);color:var(--blue);background:var(--blue-dim);}
.prog-row{display:flex;align-items:center;gap:7px;margin-bottom:7px;}
.prog-bar{flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--green);border-radius:2px;transition:width .3s;}
.prog-txt{font-size:11px;color:var(--text3);font-family:var(--mono);min-width:28px;text-align:right;}
/* NOTES */
.notes-layout{display:grid;grid-template-columns:210px 1fr;gap:10px;min-height:500px;}
@media(max-width:640px){.notes-layout{grid-template-columns:1fr;}}
.notes-sidebar{display:flex;flex-direction:column;gap:6px;}
.notes-list{display:flex;flex-direction:column;gap:3px;flex:1;max-height:420px;overflow-y:auto;}
.note-entry{padding:7px 9px;border-radius:5px;border:1px solid transparent;cursor:pointer;background:var(--bg3);}
.note-entry:hover{border-color:var(--border2);}
.note-entry.active{border-color:var(--blue);background:var(--blue-dim);}
.note-ts{font-size:10px;color:var(--text3);font-family:var(--mono);margin-bottom:1px;}
.note-entry-title{font-size:12px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.note-editor{display:flex;flex-direction:column;gap:7px;}
.note-editor textarea{flex:1;min-height:300px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:11px;color:var(--text);font-family:var(--mono);font-size:13px;resize:vertical;line-height:1.7;}
.note-editor textarea:focus{outline:none;border-color:var(--blue);}
.note-title-inp{background:var(--bg3);border:1px solid var(--border);border-radius:5px;padding:6px 11px;color:var(--text);font-family:var(--font);font-size:14px;font-weight:500;width:100%;}
.note-title-inp:focus{outline:none;border-color:var(--blue);}
/* TEMPLATES */
.tpl-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:7px;margin-bottom:12px;}
.tpl-btn{padding:8px 10px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;font-family:var(--font);text-align:left;transition:all .15s;position:relative;}
.tpl-btn:hover{border-color:var(--amber);color:var(--amber);background:var(--amber-dim);}
.tpl-icon{font-size:14px;display:block;margin-bottom:2px;}
.tpl-name{font-weight:500;display:block;font-size:12px;}
.tpl-desc{font-size:10px;color:var(--text3);margin-top:1px;display:block;}
.tpl-edit-dot{position:absolute;top:5px;right:6px;font-size:13px;color:var(--text3);opacity:0;transition:opacity .15s;}
.tpl-btn:hover .tpl-edit-dot{opacity:1;}
/* TAGS */
.tag{display:inline-block;font-size:10px;padding:2px 6px;border-radius:10px;font-weight:500;margin-right:3px;}
.tag-incident{background:var(--red-dim);color:var(--red);}
.tag-response{background:var(--purple-dim);color:var(--purple);}
.tag-obs{background:var(--bg4);color:var(--text2);}
.tag-task{background:var(--green-dim);color:var(--green);}
/* LOG */
.log-entry{display:flex;gap:9px;padding:7px 9px;border-radius:5px;background:var(--bg3);margin-bottom:4px;border-left:3px solid var(--border2);}
.log-entry.incident{border-left-color:var(--red);}
.log-entry.response{border-left-color:var(--purple);}
.log-entry.task{border-left-color:var(--green);}
.log-entry.note{border-left-color:var(--blue);}
.log-entry.scan{border-left-color:var(--amber);}
.log-time{font-family:var(--mono);font-size:11px;color:var(--text3);min-width:80px;padding-top:1px;white-space:nowrap;}
.log-body{flex:1;}
.log-title{font-size:13px;color:var(--text);font-weight:500;}
.log-detail{font-size:12px;color:var(--text2);margin-top:2px;line-height:1.5;}
/* SITES */
.sites-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-top:8px;}
.site-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:11px;}
.site-card.ok{border-left:3px solid var(--green);}
.site-card.due{border-left:3px solid var(--amber);}
.site-card.overdue{border-left:3px solid var(--red);}
.site-card.never{border-left:3px solid var(--text3);}
.site-header{display:flex;align-items:center;gap:5px;margin-bottom:6px;flex-wrap:wrap;}
.site-name{font-size:13px;font-weight:500;color:var(--text);flex:1;}
.sbadge{font-size:10px;padding:2px 6px;border-radius:10px;font-weight:500;white-space:nowrap;}
.sbadge-nerc{background:#1a2a3a;color:#4d9eff;}
.sbadge-adhoc{background:#2a1a3a;color:#9b7fff;}
.sbadge-ok{background:var(--green-dim);color:var(--green);}
.sbadge-due{background:var(--amber-dim);color:var(--amber);}
.sbadge-overdue{background:var(--red-dim);color:var(--red);}
.sbadge-never{background:var(--bg4);color:var(--text3);}
.site-meta{font-size:11px;color:var(--text3);margin-bottom:6px;font-family:var(--mono);}
.site-actions{display:flex;gap:5px;flex-wrap:wrap;}
.scan-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--green);background:var(--green-dim);color:var(--green);font-size:11px;cursor:pointer;font-family:var(--font);}
.scan-btn:hover{background:var(--green);color:#000;}
.site-ref{font-size:11px;color:var(--text3);margin-top:6px;font-style:italic;border-top:1px solid var(--border);padding-top:5px;}
.filter-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;align-items:center;}
.filter-btn{padding:4px 11px;border-radius:10px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;font-family:var(--font);}
.filter-btn.active{border-color:var(--blue);color:var(--blue);background:var(--blue-dim);}
.stat-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;}
.stat-chip{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:5px 11px;}
.stat-chip .sv{font-family:var(--mono);font-size:17px;font-weight:500;color:var(--text);display:block;}
.stat-chip .sl{font-size:11px;color:var(--text3);}
.section-header{font-size:11px;font-weight:500;color:var(--amber);letter-spacing:.07em;text-transform:uppercase;margin:12px 0 6px;display:flex;align-items:center;gap:6px;}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);display:flex;align-items:flex-start;justify-content:center;z-index:100;padding:20px;overflow-y:auto;}
.modal-overlay.hidden{display:none;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:18px;width:480px;max-width:100%;margin:auto;}
.modal-title{font-size:15px;font-weight:500;margin-bottom:12px;color:var(--text);}
.modal label{font-size:12px;color:var(--text2);display:block;margin-bottom:3px;margin-top:9px;}
.modal input,.modal select,.modal textarea,.minp{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:6px 9px;color:var(--text);font-family:var(--font);font-size:13px;}
.modal input:focus,.modal select:focus,.modal textarea:focus,.minp:focus{outline:none;border-color:var(--blue);}
.modal textarea{min-height:65px;resize:vertical;font-family:var(--mono);}
.modal select option{background:var(--bg3);}
.modal-actions{display:flex;gap:7px;margin-top:14px;justify-content:flex-end;flex-wrap:wrap;}
/* HANDOFF */
.handoff-box{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:14px;font-family:var(--mono);font-size:12px;line-height:1.8;color:var(--text2);white-space:pre-wrap;max-height:400px;overflow-y:auto;}
/* FIELD BUILDER */
.field-row{display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--bg3);border-radius:5px;margin-bottom:4px;}
.field-row input{flex:1;background:var(--bg4);border:1px solid var(--border2);border-radius:4px;padding:4px 8px;color:var(--text);font-family:var(--font);font-size:12px;}
.field-row input:focus{outline:none;border-color:var(--blue);}
.field-row select{background:var(--bg4);border:1px solid var(--border2);border-radius:4px;padding:4px 6px;color:var(--text);font-family:var(--font);font-size:12px;}
.field-row .fmove{cursor:grab;color:var(--text3);font-size:14px;padding:0 2px;}
/* TOAST */
.toast{position:fixed;bottom:18px;right:18px;background:var(--red);color:#fff;padding:9px 16px;border-radius:6px;font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;font-family:var(--mono);}
.toast.show{opacity:1;}
.empty{font-size:12px;color:var(--text3);text-align:center;padding:14px 0;}
select{background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:5px 8px;color:var(--text);font-family:var(--font);font-size:13px;}
select option{background:var(--bg3);}
input[type=checkbox]{accent-color:var(--green);}
.hf-options{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:10px 0;}
.hf-opt{display:flex;align-items:center;gap:7px;padding:6px 10px;background:var(--bg3);border-radius:5px;font-size:13px;cursor:pointer;}
.hf-opt input{width:14px;height:14px;flex-shrink:0;}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-brand">◈ CTRL ROOM</div>
  <button class="nav-tab active" onclick="switchView('ops',this)">Ops</button>
  <button class="nav-tab" onclick="switchView('scans',this)">Scans</button>
  <button class="nav-tab" onclick="switchView('notes',this)">Notes</button>
  <button class="nav-tab" onclick="switchView('log',this)">Log</button>
  <div class="nav-spacer"></div>
  <div class="nav-time" id="nav-clock"></div>
</div>

<!-- OPS -->
<div class="view active" id="view-ops">
  <div class="timer-strip">
    <div class="timer-big" id="timer-disp">30:00</div>
    <div class="timer-bar-wrap"><div class="timer-bar-fill" id="timer-fill" style="width:100%"></div></div>
    <span class="cycles-badge" id="cycles-badge">0 cycles</span>
    <button class="tbtn" id="timer-btn" onclick="toggleTimer()">Start</button>
    <button class="tbtn" onclick="resetTimer()">Reset</button>
  </div>
  <div class="cols3">
    <div class="card">
      <div class="card-title">Recurring tasks</div>
      <div id="rec-list"></div>
      <div class="add-row"><input id="rec-inp" placeholder="Add recurring task..." onkeydown="if(event.key==='Enter')addRec()"><button onclick="addRec()">+</button></div>
    </div>
    <div class="card">
      <div class="card-title">Ad hoc tasks</div>
      <div id="adhoc-list" style="max-height:250px;overflow-y:auto;"></div>
      <div class="add-row"><input id="adhoc-inp" placeholder="Quick capture..." onkeydown="if(event.key==='Enter')addAdhoc()"><button onclick="addAdhoc()">+</button></div>
    </div>
    <div class="card">
      <div class="card-title">Checklists</div>
      <div class="cl-tabs" id="cl-tabs"></div>
      <div class="prog-row" id="cl-prog-row" style="display:none"><div class="prog-bar"><div class="prog-fill" id="cl-prog-fill" style="width:0%"></div></div><div class="prog-txt" id="cl-prog-txt">0/0</div></div>
      <div id="cl-items" style="max-height:190px;overflow-y:auto;"></div>
      <div class="add-row" style="margin-top:7px;flex-wrap:wrap;gap:4px;">
        <input id="cl-list-inp" placeholder="New list..." onkeydown="if(event.key==='Enter')addClList()" style="max-width:105px;flex:none;">
        <button onclick="addClList()" style="font-size:11px;">+ List</button>
        <input id="cl-item-inp" placeholder="Add item..." onkeydown="if(event.key==='Enter')addClItem()" style="flex:1;display:none;">
        <button id="cl-item-btn" onclick="addClItem()" style="display:none;font-size:11px;">+</button>
      </div>
    </div>
  </div>
</div>

<!-- SCANS -->
<div class="view" id="view-scans">
  <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;flex-wrap:wrap;">
    <button class="btn-primary" onclick="openAddSite()">+ Add site</button>
    <button class="tbtn" onclick="scanAllNERC()">Scan all NERC</button>
    <div class="nav-spacer"></div>
    <span id="scan-next-due" style="font-family:var(--mono);font-size:11px;color:var(--text3);"></span>
  </div>
  <div class="stat-row" id="scan-stats"></div>
  <div class="filter-row">
    <button class="filter-btn active" onclick="setSiteFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setSiteFilter('overdue',this)">Overdue</button>
    <button class="filter-btn" onclick="setSiteFilter('due',this)">Due soon</button>
    <button class="filter-btn" onclick="setSiteFilter('ok',this)">OK</button>
    <button class="filter-btn" onclick="setSiteFilter('nerc',this)">NERC only</button>
    <button class="filter-btn" onclick="setSiteFilter('nonadhoc',this)">Regular only</button>
  </div>
  <div id="sites-grid"></div>
</div>

<!-- NOTES -->
<div class="view" id="view-notes">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px;">
    <div style="font-size:11px;color:var(--text3);">Templates</div>
    <button class="btn-amber" onclick="openTplManager()">⚙ Edit templates</button>
  </div>
  <div class="tpl-grid" id="tpl-grid"></div>
  <div class="notes-layout">
    <div class="notes-sidebar">
      <div class="card-title" style="padding:0 2px;">Notes log</div>
      <button class="tbtn" style="text-align:center;width:100%;" onclick="newBlankNote()">+ New note</button>
      <div class="notes-list" id="notes-list"></div>
    </div>
    <div class="card note-editor">
      <div id="note-no-sel" style="color:var(--text3);font-size:13px;padding:20px;text-align:center;">Select a note or use a template above</div>
      <div id="note-form" style="display:none;flex-direction:column;gap:7px;">
        <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
          <input class="note-title-inp" id="note-title" placeholder="Note title..." style="flex:1;min-width:120px;">
          <select id="note-tag">
            <option value="obs">Observation</option>
            <option value="incident">Incident</option>
            <option value="response">Response</option>
            <option value="task">Task note</option>
          </select>
          <button class="btn-primary" onclick="saveNote()">Save</button>
          <button class="btn-cancel" onclick="deleteNote()">Del</button>
        </div>
        <textarea id="note-body" placeholder="Start typing..."></textarea>
        <div style="font-size:11px;color:var(--text3);font-family:var(--mono);" id="note-meta"></div>
      </div>
    </div>
  </div>
</div>

<!-- LOG -->
<div class="view" id="view-log">
  <div class="stat-row" id="log-stats"></div>
  <div style="display:flex;gap:7px;margin-bottom:10px;align-items:center;flex-wrap:wrap;">
    <select id="log-filter" onchange="renderLog()">
      <option value="all">All entries</option>
      <option value="incident">Incidents only</option>
      <option value="response">Responses only</option>
      <option value="task">Tasks only</option>
      <option value="note">Notes only</option>
      <option value="scan">Scans only</option>
    </select>
    <button class="tbtn" onclick="openHandoffConfig()">🔄 Shift handoff</button>
    <button class="btn-danger" onclick="clearLog()">Clear log</button>
  </div>
  <div id="log-list" style="max-height:520px;overflow-y:auto;"></div>
</div>

<!-- MODAL: DYNAMIC TEMPLATE FORM -->
<div class="modal-overlay hidden" id="modal-tpl-form">
  <div class="modal" style="width:500px;">
    <div class="modal-title" id="tpl-form-title">Log entry</div>

<div class="toast" id="toast"></div>

<script>
const SK='ctrlroom_v5';

// DEFAULT SITES from screenshot
const DEFAULT_SITES=[
  {name:'BYPS1',nerc:true,adhoc:false,interval:30,threshold:5,notes:''},
  {name:'Condor Bess',nerc:true,adhoc:false,interval:30,threshold:5,notes:''},
  {name:'COSO Bess',nerc:true,adhoc:false,interval:30,threshold:5,notes:''},
  {name:'GDWL',nerc:true,adhoc:false,interval:30,threshold:5,notes:''},
  {name:'Goleta',nerc:true,adhoc:false,interval:30,threshold:5,notes:''},
  {name:'Harq 1',nerc:true,adhoc:false,interval:30,threshold:5,notes:''},
  {name:'Harq 2 Combo',nerc:true,adhoc:false,interval:30,threshold:5,notes:''},
  {name:'Kuna BESS',nerc:true,adhoc:false,interval:30,threshold:5,notes:''},
  {name:'LNDL',nerc:true,adhoc:false,interval:30,threshold:5,notes:''},
  {name:'Northstar',nerc:true,adhoc:false,interval:30,threshold:5,notes:''},
  {name:'ORGN',nerc:true,adhoc:false,interval:30,threshold:5,notes:''},
  {name:'Peregrine Bess',nerc:true,adhoc:false,interval:30,threshold:5,notes:''},
  {name:'RKRG',nerc:true,adhoc:false,interval:30,threshold:5,notes:''},
  {name:'CFLTS',nerc:true,adhoc:true,interval:30,threshold:5,notes:''},
  {name:'FRDN',nerc:true,adhoc:true,interval:30,threshold:5,notes:''},
  {name:'MRCP',nerc:true,adhoc:true,interval:30,threshold:5,notes:''},
  {name:'PDMT',nerc:true,adhoc:true,interval:30,threshold:5,notes:''},
  {name:'VIDL',nerc:true,adhoc:true,interval:30,threshold:5,notes:''},
  {name:'Tropico',nerc:false,adhoc:true,interval:30,threshold:5,notes:''},
];

// DEFAULT TEMPLATES
const DEFAULT_TEMPLATES=[
  {id:'incident',icon:'🚨',name:'Incident report',tag:'incident',loggable:true,fields:[
    {id:'f1',label:'Location / zone',type:'text',required:true,placeholder:'Zone, gate, site name...'},
    {id:'f2',label:'Severity',type:'select',required:true,options:'Low,Medium,High,Critical',defaultVal:'High'},
    {id:'f3',label:'Reported by',type:'text',required:false,placeholder:'Name or radio ID...'},
    {id:'f4',label:'Description',type:'textarea',required:true,placeholder:'What happened?'},
    {id:'f5',label:'Action taken',type:'textarea',required:false,placeholder:'What did you do?'},
    {id:'f6',label:'Follow-up required?',type:'select',required:false,options:'No,Yes — open item',defaultVal:'No'},
  ]},
  {id:'response',icon:'✅',name:'Correct response',tag:'response',loggable:true,fields:[
    {id:'f1',label:'Situation / trigger',type:'text',required:true,placeholder:'What prompted this?'},
    {id:'f2',label:'Who was notified',type:'text',required:false,placeholder:'Names, teams, channels...'},
    {id:'f3',label:'Procedure followed',type:'textarea',required:false,placeholder:'Steps taken...'},
    {id:'f4',label:'Resolution / outcome',type:'textarea',required:false,placeholder:'What was the result?'},
    {id:'f5',label:'Escalation',type:'select',required:false,options:'No escalation,Yes — escalated,Yes — pending',defaultVal:'No escalation'},
  ]},
  {id:'obs',icon:'📋',name:'Observation',tag:'obs',loggable:false,fields:[
    {id:'f1',label:'Location',type:'text',required:false,placeholder:'Where?'},
    {id:'f2',label:'Observation',type:'textarea',required:true,placeholder:'What did you observe?'},
    {id:'f3',label:'Action taken',type:'text',required:false,placeholder:'Any action?'},
  ]},
  {id:'callback',icon:'📞',name:'Callback / follow-up',tag:'task',loggable:true,fields:[
    {id:'f1',label:'Contact',type:'text',required:true,placeholder:'Name or number...'},
    {id:'f2',label:'Reason',type:'text',required:false,placeholder:'Why are you calling back?'},
    {id:'f3',label:'Follow up by',type:'text',required:false,placeholder:'Time or deadline...'},
  ]},
  {id:'handoff',icon:'🔄',name:'Shift handoff',tag:'obs',loggable:false,fields:[]},
];

let S={
  recTasks:[],adhocTasks:[],checklists:{},activeList:null,
  notes:[],activeNote:null,
  logEntries:[],
  sites:[],siteFilter:'all',
  templates:null,
  timerRunning:false,timerElapsed:0,timerCycles:0,
  shiftStart:Date.now(),
  activeTplEdit:null,
};

// current template form state
let _tplFormId=null;
let _tplEditFields=[];

function save(){
  try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}
  try{window.storage&&window.storage.set(SK,JSON.stringify(S));}catch(e){}
}

async function load(){
  let raw=null;
  try{raw=localStorage.getItem(SK);}catch(e){}
  if(!raw){try{const r=await window.storage.get(SK);if(r)raw=r.value;}catch(e){}}
  if(raw){
    try{
      const p=JSON.parse(raw);
      S={...S,...p};
      if(!S.checklists)S.checklists={};
      if(!S.notes)S.notes=[];
      if(!S.logEntries)S.logEntries=[];
      if(!S.timerCycles)S.timerCycles=0;
      if(!S.shiftStart)S.shiftStart=Date.now();
      if(!S.templates)S.templates=JSON.parse(JSON.stringify(DEFAULT_TEMPLATES));
      // Seed sites if none
      if(!S.sites||S.sites.length===0){
        S.sites=DEFAULT_SITES.map((s,i)=>({...s,id:Date.now()+i,lastScan:null,scanCount:0}));
      }
    }catch(e){}
  } else {
    S.templates=JSON.parse(JSON.stringify(DEFAULT_TEMPLATES));
    S.sites=DEFAULT_SITES.map((s,i)=>({...s,id:Date.now()+i,lastScan:null,scanCount:0}));
  }
  renderAll();
  if(S.timerRunning)startTimerInterval();
  setInterval(()=>{if(document.getElementById('view-scans').classList.contains('active'))renderSites();},30000);
}

// CLOCK
function updateClock(){document.getElementById('nav-clock').textContent=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
setInterval(updateClock,1000);updateClock();

function ts(d){return new Date(d||Date.now()).toLocaleString([],{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function tsShort(d){return new Date(d||Date.now()).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});}
function tsDate(d){return new Date(d||Date.now()).toLocaleDateString([],{month:'short',day:'numeric'});}

// VIEW
function switchView(v,el){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  if(el)el.classList.add('active');
  if(v==='log')renderLog();
  if(v==='scans'){renderSites();}
}

// TIMER
let timerInt=null;
const TOTAL=30*60;
function toggleTimer(){if(S.timerRunning)stopTimer();else{S.timerRunning=true;save();startTimerInterval();}}
function startTimerInterval(){
  document.getElementById('timer-btn').textContent='Stop';
  document.getElementById('timer-btn').classList.add('active-btn');
  timerInt=setInterval(()=>{
    S.timerElapsed++;
    if(S.timerElapsed>=TOTAL){
      S.timerElapsed=0;S.timerCycles++;
      addLog({type:'task',title:'Cycle #'+S.timerCycles+' complete',detail:''});
      fireAlert('Cycle #'+S.timerCycles+' — time to scan!');
    }
    save();updateTimerUI();
  },1000);
}
function stopTimer(){S.timerRunning=false;clearInterval(timerInt);timerInt=null;document.getElementById('timer-btn').textContent='Start';document.getElementById('timer-btn').classList.remove('active-btn');save();}
function resetTimer(){stopTimer();S.timerElapsed=0;save();updateTimerUI();}
function updateTimerUI(){
  const rem=TOTAL-S.timerElapsed;
  const disp=document.getElementById('timer-disp');
  disp.textContent=String(Math.floor(rem/60)).padStart(2,'0')+':'+String(rem%60).padStart(2,'0');
  const urgent=rem<=120;
  disp.classList.toggle('urgent',urgent);
  document.getElementById('timer-fill').style.width=((rem/TOTAL)*100).toFixed(1)+'%';
  document.getElementById('timer-fill').classList.toggle('urgent',urgent);
  document.getElementById('cycles-badge').textContent=S.timerCycles+' cycle'+(S.timerCycles!==1?'s':'');
}

// RECURRING
function addRec(){const v=document.getElementById('rec-inp').value.trim();if(!v)return;S.recTasks.push({id:Date.now(),name:v,done:false});document.getElementById('rec-inp').value='';save();renderRec();}
function toggleRec(id){const t=S.recTasks.find(x=>x.id===id);if(t)t.done=!t.done;save();renderRec();}
function delRec(id){S.recTasks=S.recTasks.filter(x=>x.id!==id);save();renderRec();}
function renderRec(){
  const el=document.getElementById('rec-list');
  if(!S.recTasks.length){el.innerHTML='<div class="empty">No recurring tasks</div>';return;}
  el.innerHTML=S.recTasks.map(t=>`<div class="task-item${t.done?' done':''}">
    <input type="checkbox" class="task-cb" ${t.done?'checked':''} onchange="toggleRec(${t.id})">
    <span class="task-label">${esc(t.name)}</span>
    <span class="rec-badge${t.done?' done':''}">${t.done?'done':'due'}</span>
    <button class="task-del" onclick="delRec(${t.id})">✕</button>
  </div>`).join('');
}

// ADHOC TASKS
function addAdhoc(){
  const v=document.getElementById('adhoc-inp').value.trim();if(!v)return;
  const now=Date.now();
  S.adhocTasks.push({id:now,name:v,done:false,ts:now});
  document.getElementById('adhoc-inp').value='';
  addLog({type:'task',title:'Task added: '+v,detail:''});
  save();renderAdhoc();
}
function toggleAdhoc(id){
  const t=S.adhocTasks.find(x=>x.id===id);
  if(t){t.done=!t.done;t.doneTs=t.done?Date.now():null;if(t.done)addLog({type:'task',title:'Task done: '+t.name,detail:''});}
  save();renderAdhoc();
}
function delAdhoc(id){S.adhocTasks=S.adhocTasks.filter(x=>x.id!==id);save();renderAdhoc();}
function renderAdhoc(){
  const el=document.getElementById('adhoc-list');
  if(!S.adhocTasks.length){el.innerHTML='<div class="empty">No tasks yet</div>';return;}
  el.innerHTML=S.adhocTasks.map(t=>`<div class="task-item${t.done?' done':''}">
    <input type="checkbox" class="task-cb" ${t.done?'checked':''} onchange="toggleAdhoc(${t.id})">
    <span class="task-label">${esc(t.name)}</span>
    <button class="task-del" onclick="delAdhoc(${t.id})">✕</button>
  </div>`).join('');
}

// CHECKLISTS
function addClList(){const v=document.getElementById('cl-list-inp').value.trim();if(!v)return;if(!S.checklists[v])S.checklists[v]=[];S.activeList=v;document.getElementById('cl-list-inp').value='';save();renderCl();}
function switchCl(name){S.activeList=name;renderCl();}
function delClList(name){delete S.checklists[name];if(S.activeList===name)S.activeList=Object.keys(S.checklists)[0]||null;save();renderCl();}
function addClItem(){if(!S.activeList)return;const v=document.getElementById('cl-item-inp').value.trim();if(!v)return;S.checklists[S.activeList].push({id:Date.now(),name:v,done:false});document.getElementById('cl-item-inp').value='';save();renderCl();}
function toggleCl(id){if(!S.activeList)return;const t=S.checklists[S.activeList].find(x=>x.id===id);if(t)t.done=!t.done;save();renderCl();}
function delCl(id){if(!S.activeList)return;S.checklists[S.activeList]=S.checklists[S.activeList].filter(x=>x.id!==id);save();renderCl();}
function renderCl(){
  const keys=Object.keys(S.checklists);
  document.getElementById('cl-tabs').innerHTML=keys.map(k=>`<span class="cl-tab${S.activeList===k?' active':''}" onclick="switchCl('${esc(k)}')">${esc(k)} <span onclick="event.stopPropagation();delClList('${esc(k)}')" style="opacity:.5;cursor:pointer;">✕</span></span>`).join('');
  const has=S.activeList&&S.checklists[S.activeList];
  document.getElementById('cl-item-inp').style.display=has?'block':'none';
  document.getElementById('cl-item-btn').style.display=has?'inline-block':'none';
  const pr=document.getElementById('cl-prog-row');
  const el=document.getElementById('cl-items');
  if(!has){el.innerHTML='<div class="empty">Create or select a list</div>';pr.style.display='none';return;}
  const list=S.checklists[S.activeList];
  const done=list.filter(x=>x.done).length,total=list.length;
  if(total>0){pr.style.display='flex';document.getElementById('cl-prog-fill').style.width=Math.round(done/total*100)+'%';document.getElementById('cl-prog-txt').textContent=done+'/'+total;}else pr.style.display='none';
  el.innerHTML=!list.length?'<div class="empty">No items</div>':list.map(t=>`<div class="task-item${t.done?' done':''}">
    <input type="checkbox" class="task-cb" ${t.done?'checked':''} onchange="toggleCl(${t.id})">
    <span class="task-label">${esc(t.name)}</span>
    <button class="task-del" onclick="delCl(${t.id})">✕</button>
  </div>`).join('');
}

// SITES
function siteStatus(s){
  if(s.adhoc||!s.lastScan)return s.lastScan?'ok':'never';
  const m=(Date.now()-s.lastScan)/60000,iv=s.interval||30,th=s.threshold||5;
  if(m>iv)return'overdue';
  if(m>iv-th)return'due';
  return'ok';
}
function statusLabel(s){return{ok:'OK',due:'Due soon',overdue:'OVERDUE',never:'Never scanned'}[s]||s;}
function statusBadgeClass(s){return{ok:'sbadge-ok',due:'sbadge-due',overdue:'sbadge-overdue',never:'sbadge-never'}[s]||'sbadge-never';}
function timeSince(ts){if(!ts)return'—';const m=Math.floor((Date.now()-ts)/60000);if(m<1)return'just now';if(m<60)return m+'min ago';return Math.floor(m/60)+'h '+m%60+'m ago';}

function setSiteFilter(f,el){
  S.siteFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  if(el)el.classList.add('active');
  renderSites();
}

function renderSites(){
  const total=S.sites.length;
  const ok=S.sites.filter(s=>siteStatus(s)==='ok').length;
  const due=S.sites.filter(s=>siteStatus(s)==='due').length;
  const ov=S.sites.filter(s=>siteStatus(s)==='overdue').length;
  const nv=S.sites.filter(s=>siteStatus(s)==='never').length;
  document.getElementById('scan-stats').innerHTML=`
    <div class="stat-chip"><span class="sv">${total}</span><span class="sl">Sites</span></div>
    <div class="stat-chip"><span class="sv" style="color:var(--green)">${ok}</span><span class="sl">OK</span></div>
    <div class="stat-chip"><span class="sv" style="color:var(--amber)">${due}</span><span class="sl">Due soon</span></div>
    <div class="stat-chip"><span class="sv" style="color:var(--red)">${ov}</span><span class="sl">Overdue</span></div>
    <div class="stat-chip"><span class="sv" style="color:var(--text3)">${nv}</span><span class="sl">Never scanned</span></div>`;
  const sorted=S.sites.filter(s=>{
    const f=S.siteFilter;
    if(f==='all')return true;
    if(f==='nerc')return s.nerc;
    if(f==='nonadhoc')return!s.adhoc;
    return siteStatus(s)===f;
  }).sort((a,b)=>{const o={overdue:0,due:1,never:2,ok:3};return(o[siteStatus(a)]||0)-(o[siteStatus(b)]||0);});

  // Split NERC scheduled / NERC adhoc / non-NERC
  const nercSched=sorted.filter(s=>s.nerc&&!s.adhoc);
  const nercAdhoc=sorted.filter(s=>s.nerc&&s.adhoc);
  const nonNerc=sorted.filter(s=>!s.nerc);

  let html='';
  if(nercSched.length){html+=`<div class="section-header">⚡ NERC sites</div><div class="sites-grid">${nercSched.map(siteCard).join('')}</div>`;}
  if(nercAdhoc.length){html+=`<div class="section-header">⚡ NERC — ad-hoc</div><div class="sites-grid">${nercAdhoc.map(siteCard).join('')}</div>`;}
  if(nonNerc.length){html+=`<div class="section-header">◻ Regular / non-NERC</div><div class="sites-grid">${nonNerc.map(siteCard).join('')}</div>`;}
  if(!sorted.length)html='<div class="empty">No sites match filter</div>';

  // Next due
  const pending=S.sites.filter(s=>s.lastScan&&!s.adhoc&&siteStatus(s)==='ok').sort((a,b)=>{
    const ar=(a.interval||30)-((Date.now()-a.lastScan)/60000);
    const br=(b.interval||30)-((Date.now()-b.lastScan)/60000);
    return ar-br;
  });
  if(pending.length){const n=pending[0];const rm=Math.max(0,(n.interval||30)-((Date.now()-n.lastScan)/60000));document.getElementById('scan-next-due').textContent='Next: '+n.name+' ~'+Math.ceil(rm)+'min';}
  else document.getElementById('scan-next-due').textContent='';

  document.getElementById('sites-grid').innerHTML=html;
}

function siteCard(s){
  const st=siteStatus(s);
  return`<div class="site-card ${st}">
    <div class="site-header">
      <span class="site-name">${esc(s.name)}</span>
      ${s.nerc?'<span class="sbadge sbadge-nerc">NERC</span>':''}
      ${s.adhoc?'<span class="sbadge sbadge-adhoc">Ad-hoc</span>':''}
      <span class="sbadge ${statusBadgeClass(st)}">${statusLabel(st)}</span>
    </div>
    <div class="site-meta">${s.adhoc?'Ad-hoc':'Interval: '+(s.interval||30)+'min'} · Last: ${timeSince(s.lastScan)} · Scans: ${s.scanCount||0}</div>
    <div class="site-actions">
      <button class="scan-btn" onclick="openScanNote(${s.id})">Scan Now</button>
      <button class="tbtn" style="font-size:11px;padding:3px 8px;" onclick="editSite(${s.id})">Edit</button>
      <button class="tbtn" style="font-size:11px;padding:3px 8px;color:var(--red);border-color:var(--red-dim);" onclick="deleteSite(${s.id})">Del</button>
    </div>
    ${s.notes?`<div class="site-ref">${esc(s.notes.substring(0,100))}${s.notes.length>100?'…':''}</div>`:''}
  </div>`;
}

function openAddSite(){
  document.getElementById('site-modal-title').textContent='Add site';
  document.getElementById('site-edit-id').value='';
  ['site-name'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('site-nerc').value='1';
  document.getElementById('site-adhoc').value='0';
  document.getElementById('site-interval').value='30';
  document.getElementById('site-threshold').value='5';
  document.getElementById('site-notes').value='';
  openModal('modal-add-site');
}
function openScanNote(id){
  const s=S.sites.find(x=>x.id===id);if(!s)return;
  document.getElementById('scan-note-title').textContent='Log scan — '+s.name;
  document.getElementById('scan-note-site-id').value=id;
  document.getElementById('scan-note-body').value='';
  openModal('modal-scan-note');
}
function confirmScan(){
  const id=parseInt(document.getElementById('scan-note-site-id').value);
  const s=S.sites.find(x=>x.id===id);if(!s)return;
  const note=document.getElementById('scan-note-body').value.trim();
  s.lastScan=Date.now();s.scanCount=(s.scanCount||0)+1;
  addLog({type:'scan',title:'Scan: '+s.name,detail:note||'All clear'});
  closeModal('modal-scan-note');save();renderSites();showToast('Scan logged','#f0a500');
}
function scanAllNERC(){
  const nerc=S.sites.filter(s=>s.nerc&&!s.adhoc);
  if(!nerc.length){showToast('No scheduled NERC sites','#9199a8');return;}
  const now=Date.now();
  nerc.forEach(s=>{s.lastScan=now;s.scanCount=(s.scanCount||0)+1;});
  addLog({type:'scan',title:'Scan all NERC ('+nerc.length+' sites)',detail:nerc.map(s=>s.name).join(', ')});
  save();renderSites();showToast('All NERC scanned','#f0a500');
}
function saveSite(){
  const name=document.getElementById('site-name').value.trim();if(!name)return;
  const editId=document.getElementById('site-edit-id').value;
  const d={name,nerc:document.getElementById('site-nerc').value==='1',adhoc:document.getElementById('site-adhoc').value==='1',interval:parseInt(document.getElementById('site-interval').value)||30,threshold:parseInt(document.getElementById('site-threshold').value)||5,notes:document.getElementById('site-notes').value.trim()};
  if(editId){const s=S.sites.find(x=>x.id===parseInt(editId));if(s)Object.assign(s,d);}
  else S.sites.push({id:Date.now(),lastScan:null,scanCount:0,...d});
  closeModal('modal-add-site');save();renderSites();showToast('Site saved','#2ecc8a');
}
function editSite(id){
  const s=S.sites.find(x=>x.id===id);if(!s)return;
  document.getElementById('site-modal-title').textContent='Edit site';
  document.getElementById('site-edit-id').value=id;
  document.getElementById('site-name').value=s.name;
  document.getElementById('site-nerc').value=s.nerc?'1':'0';
  document.getElementById('site-adhoc').value=s.adhoc?'1':'0';
  document.getElementById('site-interval').value=s.interval||30;
  document.getElementById('site-threshold').value=s.threshold||5;
  document.getElementById('site-notes').value=s.notes||'';
  openModal('modal-add-site');
}
function deleteSite(id){if(confirm('Delete this site?')){S.sites=S.sites.filter(s=>s.id!==id);save();renderSites();}}

// =====================
// TEMPLATES (fully editable)
// =====================
function getTemplates(){return S.templates||DEFAULT_TEMPLATES;}

function renderTemplates(){
  const tpls=getTemplates();
  document.getElementById('tpl-grid').innerHTML=tpls.map(t=>
    `<button class="tpl-btn" onclick="useTpl('${t.id}')">
      <span class="tpl-icon">${t.icon||'📝'}</span>
      <span class="tpl-name">${esc(t.name)}</span>
      <span class="tpl-desc">${t.tag}</span>
      <span class="tpl-edit-dot">✎</span>
    </button>`
  ).join('');
}

function useTpl(id){
  if(id==='handoff'){openHandoffConfig();return;}
  const tpl=getTemplates().find(t=>t.id===id);if(!tpl)return;
  if(!tpl.fields||!tpl.fields.length){
    // Freeform note
    const now=tsShort();
    newNote(tpl.name+' — '+now,'Time: '+now+'\n\n',tpl.tag);
    return;
  }
  _tplFormId=id;
  document.getElementById('tpl-form-title').textContent=tpl.icon+' '+tpl.name;
  const container=document.getElementById('tpl-form-fields');
  container.innerHTML=tpl.fields.map(f=>{
    const req=f.required?'*':'';
    if(f.type==='select'){
      const opts=(f.options||'').split(',').map(o=>`<option${o===f.defaultVal?' selected':''}>${esc(o.trim())}</option>`).join('');
      return`<label>${esc(f.label)}${req}</label><select id="tplf_${f.id}" style="width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:6px 9px;color:var(--text);font-family:var(--font);font-size:13px;">${opts}</select>`;
    }
    if(f.type==='textarea'){
      return`<label>${esc(f.label)}${req}</label><textarea id="tplf_${f.id}" placeholder="${esc(f.placeholder||'')}" style="width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:6px 9px;color:var(--text);font-family:var(--mono);font-size:13px;min-height:60px;resize:vertical;"></textarea>`;
    }
    return`<label>${esc(f.label)}${req}</label><input id="tplf_${f.id}" type="text" placeholder="${esc(f.placeholder||'')}" style="width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:6px 9px;color:var(--text);font-family:var(--font);font-size:13px;">`;
  }).join('');
  openModal('modal-tpl-form');
}

function submitTplForm(){
  const tpl=getTemplates().find(t=>t.id===_tplFormId);if(!tpl)return;
  const now=new Date();
  const nowStr=ts(now);
  let body='Time: '+nowStr+'\n';
  let hasRequired=true;
  tpl.fields.forEach(f=>{
    const el=document.getElementById('tplf_'+f.id);
    if(!el)return;
    const val=el.value.trim();
    if(f.required&&!val){hasRequired=false;el.style.borderColor='var(--red)';return;}
    el.style.borderColor='';
    body+=f.label+': '+val+'\n';
  });
  if(!hasRequired){showToast('Fill required fields (*)','#e85555');return;}
  const title=tpl.name+' — '+tsShort(now);
  const isFollowup=tpl.fields.find(f=>f.label.toLowerCase().includes('follow')&&document.getElementById('tplf_'+f.id)?.value.toLowerCase().includes('yes'));
  newNote(title,body,tpl.tag);
  if(tpl.loggable){
    addLog({type:tpl.tag==='incident'?'incident':tpl.tag==='response'?'response':tpl.tag==='task'?'task':'note',title,detail:body.substring(0,120),followup:!!isFollowup});
  }
  closeModal('modal-tpl-form');
  showToast('Saved','#2ecc8a');
}

// TEMPLATE MANAGER
function openTplManager(){
  refreshTplSelect();
  if(getTemplates().length>0)loadTplForEdit(getTemplates()[0].id);
  openModal('modal-tpl-manager');
}
function refreshTplSelect(){
  const sel=document.getElementById('tpl-select-edit');
  sel.innerHTML=getTemplates().map(t=>`<option value="${t.id}">${esc(t.name)}</option>`).join('');
  if(S.activeTplEdit)sel.value=S.activeTplEdit;
}
function loadTplForEdit(id){
  const tid=id||document.getElementById('tpl-select-edit').value;
  const tpl=getTemplates().find(t=>t.id===tid);if(!tpl)return;
  S.activeTplEdit=tid;
  document.getElementById('tpl-edit-name').value=tpl.name;
  document.getElementById('tpl-edit-icon').value=tpl.icon||'📝';
  document.getElementById('tpl-edit-tag').value=tpl.tag||'obs';
  document.getElementById('tpl-edit-loggable').value=tpl.loggable?'1':'0';
  _tplEditFields=JSON.parse(JSON.stringify(tpl.fields||[]));
  renderTplFields();
}
function renderTplFields(){
  document.getElementById('tpl-field-list').innerHTML=_tplEditFields.map((f,i)=>`
    <div class="field-row" id="tplrow_${i}">
      <span class="fmove">⠿</span>
      <input value="${esc(f.label)}" placeholder="Field label" oninput="_tplEditFields[${i}].label=this.value">
      <select onchange="_tplEditFields[${i}].type=this.value;renderTplFields()">
        <option${f.type==='text'?' selected':''}>text</option>
        <option${f.type==='textarea'?' selected':''}>textarea</option>
        <option${f.type==='select'?' selected':''}>select</option>
      </select>
      ${f.type==='select'?`<input value="${esc(f.options||'')}" placeholder="opt1,opt2,..." oninput="_tplEditFields[${i}].options=this.value" style="max-width:130px;">`:''}
      <label style="font-size:11px;color:var(--text2);display:flex;align-items:center;gap:3px;white-space:nowrap;"><input type="checkbox" ${f.required?'checked':''} onchange="_tplEditFields[${i}].required=this.checked"> Req</label>
      <button class="task-del" onclick="_tplEditFields.splice(${i},1);renderTplFields()">✕</button>
    </div>`).join('');
}
function addTplField(){
  _tplEditFields.push({id:'f'+Date.now(),label:'New field',type:'text',required:false,placeholder:'',options:''});
  renderTplFields();
}
function newTemplate(){
  const id='tpl'+Date.now();
  getTemplates().push({id,icon:'📝',name:'New template',tag:'obs',loggable:false,fields:[]});
  save();refreshTplSelect();loadTplForEdit(id);
}
function deleteTemplate(){
  const tid=document.getElementById('tpl-select-edit').value;
  if(getTemplates().length<=1){showToast('Need at least 1 template','#9199a8');return;}
  S.templates=getTemplates().filter(t=>t.id!==tid);
  save();refreshTplSelect();loadTplForEdit();renderTemplates();
}
function saveTplEdits(){
  const tid=S.activeTplEdit;
  const tpl=getTemplates().find(t=>t.id===tid);if(!tpl)return;
  tpl.name=document.getElementById('tpl-edit-name').value||'Template';
  tpl.icon=document.getElementById('tpl-edit-icon').value||'📝';
  tpl.tag=document.getElementById('tpl-edit-tag').value;
  tpl.loggable=document.getElementById('tpl-edit-loggable').value==='1';
  tpl.fields=JSON.parse(JSON.stringify(_tplEditFields));
  save();renderTemplates();closeModal('modal-tpl-manager');showToast('Template saved','#2ecc8a');
}

// NOTES — fully timestamped
function newBlankNote(){newNote('New note','','obs');}
function newNote(title,body,tag){
  const now=Date.now();
  const note={id:now,title:title||'New note',body:body||'',tag:tag||'obs',created:now,modified:now};
  S.notes.unshift(note);S.activeNote=note.id;
  save();renderNotes();loadNoteForm(note);
  switchView('notes',document.querySelectorAll('.nav-tab')[2]);
}
function selectNote(id){S.activeNote=id;const n=S.notes.find(x=>x.id===id);renderNotes();if(n)loadNoteForm(n);}
function loadNoteForm(note){
  document.getElementById('note-no-sel').style.display='none';
  const f=document.getElementById('note-form');f.style.display='flex';
  document.getElementById('note-title').value=note.title;
  document.getElementById('note-body').value=note.body;
  document.getElementById('note-tag').value=note.tag||'obs';
  document.getElementById('note-meta').textContent='Created: '+ts(note.created)+' · Modified: '+ts(note.modified);
}
function saveNote(){
  if(!S.activeNote)return;
  const note=S.notes.find(n=>n.id===S.activeNote);if(!note)return;
  note.title=document.getElementById('note-title').value||'Untitled';
  note.body=document.getElementById('note-body').value;
  note.tag=document.getElementById('note-tag').value;
  note.modified=Date.now();
  document.getElementById('note-meta').textContent='Created: '+ts(note.created)+' · Modified: '+ts(note.modified);
  // Only log if not already logged via template
  addLog({type:note.tag==='incident'?'incident':note.tag==='response'?'response':'note',title:'[edited] '+note.title,detail:note.body.substring(0,100)});
  save();renderNotes();showToast('Saved','#2ecc8a');
}
function deleteNote(){
  if(!S.activeNote)return;
  S.notes=S.notes.filter(n=>n.id!==S.activeNote);
  S.activeNote=S.notes[0]?.id||null;
  save();renderNotes();
  if(S.activeNote)loadNoteForm(S.notes.find(n=>n.id===S.activeNote));
  else{document.getElementById('note-form').style.display='none';document.getElementById('note-no-sel').style.display='block';}
}
const TAG_LABELS={obs:'Obs',incident:'Incident',response:'Response',task:'Task'};
const TAG_CLS={obs:'tag-obs',incident:'tag-incident',response:'tag-response',task:'tag-task'};
function renderNotes(){
  const el=document.getElementById('notes-list');
  if(!S.notes.length){el.innerHTML='<div class="empty">No notes yet</div>';return;}
  el.innerHTML=S.notes.map(n=>`<div class="note-entry${S.activeNote===n.id?' active':''}" onclick="selectNote(${n.id})">
    <div class="note-ts">${ts(n.created)}</div>
    <div class="note-entry-title">${esc(n.title)}</div>
    <div style="margin-top:2px;"><span class="tag ${TAG_CLS[n.tag]||'tag-obs'}">${TAG_LABELS[n.tag]||n.tag}</span></div>
  </div>`).join('');
}

// LOG
function addLog(entry){
  S.logEntries.unshift({...entry,ts:Date.now(),id:Date.now()+'_'+Math.random()});
  if(S.logEntries.length>600)S.logEntries=S.logEntries.slice(0,600);
  save();
}
function renderLog(){
  const filter=document.getElementById('log-filter').value;
  const entries=filter==='all'?S.logEntries:S.logEntries.filter(e=>e.type===filter);
  const el=document.getElementById('log-list');
  el.innerHTML=!entries.length?'<div class="empty">No entries</div>':entries.map(e=>`<div class="log-entry ${e.type||'note'}">
    <div class="log-time">${ts(e.ts)}</div>
    <div class="log-body">
      <div class="log-title">${esc(e.title||'')}</div>
      ${e.detail?`<div class="log-detail">${esc(e.detail)}</div>`:''}
    </div>
  </div>`).join('');
  const total=S.logEntries.length;
  const inc=S.logEntries.filter(e=>e.type==='incident').length;
  const res=S.logEntries.filter(e=>e.type==='response').length;
  const tsk=S.logEntries.filter(e=>e.type==='task').length;
  const scn=S.logEntries.filter(e=>e.type==='scan').length;
  document.getElementById('log-stats').innerHTML=`
    <div class="stat-chip"><span class="sv">${total}</span><span class="sl">Total</span></div>
    <div class="stat-chip"><span class="sv" style="color:var(--red)">${inc}</span><span class="sl">Incidents</span></div>
    <div class="stat-chip"><span class="sv" style="color:var(--purple)">${res}</span><span class="sl">Responses</span></div>
    <div class="stat-chip"><span class="sv" style="color:var(--green)">${tsk}</span><span class="sl">Tasks</span></div>
    <div class="stat-chip"><span class="sv" style="color:var(--amber)">${scn}</span><span class="sl">Scans</span></div>`;
}
function clearLog(){if(confirm('Clear all log entries?')){S.logEntries=[];save();renderLog();}}

// HANDOFF — configurable
const HF_OPTIONS=[
  {id:'open_incidents',label:'Open incidents (follow-up required)',default:true},
  {id:'open_tasks',label:'Incomplete ad-hoc tasks',default:true},
  {id:'overdue_sites',label:'Overdue / due-soon scans',default:true},
  {id:'all_incidents',label:'All incidents this shift',default:true},
  {id:'all_responses',label:'All responses this shift',default:true},
  {id:'tasks_done',label:'Completed tasks count',default:true},
  {id:'scan_summary',label:'Scan activity summary',default:true},
  {id:'checklist_status',label:'Checklist completion status',default:true},
  {id:'cycle_count',label:'Timer cycles completed',default:false},
  {id:'all_notes',label:'All notes (titles)',default:false},
];

function openHandoffConfig(){
  const container=document.getElementById('hf-options');
  container.innerHTML=HF_OPTIONS.map(o=>`<label class="hf-opt">
    <input type="checkbox" id="hfo_${o.id}" ${o.default?'checked':''}>
    ${esc(o.label)}
  </label>`).join('');
  document.getElementById('hf-extra').value='';
  openModal('modal-handoff-cfg');
}

function buildHandoff(){
  const opts={};
  HF_OPTIONS.forEach(o=>{const el=document.getElementById('hfo_'+o.id);opts[o.id]=el?el.checked:o.default;});
  const extra=document.getElementById('hf-extra').value.trim();
  const now=new Date();
  const shiftStartStr=ts(S.shiftStart);
  const shiftEndStr=ts(now);
  const since=S.shiftStart;
  const todayE=S.logEntries.filter(e=>e.ts>=since);
  const incidents=todayE.filter(e=>e.type==='incident');
  const responses=todayE.filter(e=>e.type==='response');
  const tasks=todayE.filter(e=>e.type==='task'&&e.title.startsWith('Task done:'));
  const scans=todayE.filter(e=>e.type==='scan');
  const openInc=incidents.filter(e=>e.followup);
  const openTasks=S.adhocTasks.filter(t=>!t.done);
  const overdueSites=S.sites.filter(s=>siteStatus(s)==='overdue');
  const dueSites=S.sites.filter(s=>siteStatus(s)==='due');
  const clKeys=Object.keys(S.checklists);

  let lines=[];
  lines.push('SHIFT HANDOFF SUMMARY');
  lines.push('─────────────────────────────');
  lines.push('Shift start : '+shiftStartStr);
  lines.push('Handoff time: '+shiftEndStr);
  if(opts.cycle_count)lines.push('Cycles      : '+S.timerCycles);
  lines.push('');

  const hasOpen=(opts.open_incidents&&openInc.length)||(opts.open_tasks&&openTasks.length)||(opts.overdue_sites&&(overdueSites.length||dueSites.length));
  lines.push('⚠  OPEN ITEMS'+(hasOpen?'':' — none'));
  if(opts.open_incidents&&openInc.length){lines.push('');lines.push('  Incidents requiring follow-up ('+openInc.length+'):');openInc.forEach(e=>{lines.push('  ['+ts(e.ts)+'] '+e.title);if(e.detail)lines.push('      '+e.detail.substring(0,100));});}
  if(opts.open_tasks&&openTasks.length){lines.push('');lines.push('  Incomplete tasks ('+openTasks.length+'):');openTasks.forEach(t=>lines.push('  • '+t.name));}
  if(opts.overdue_sites){if(overdueSites.length){lines.push('');lines.push('  Overdue scans:');overdueSites.forEach(s=>lines.push('  • '+s.name+(s.nerc?' [NERC]':'')+' — last '+timeSince(s.lastScan)));}
  if(dueSites.length){lines.push('');lines.push('  Due soon:');dueSites.forEach(s=>lines.push('  • '+s.name+(s.nerc?' [NERC]':'')));}}

  lines.push('');
  lines.push('✓  ACTIVITY THIS SHIFT');
  if(opts.all_incidents){lines.push('  Incidents: '+incidents.length+(incidents.length?'':' — none'));if(incidents.length){incidents.forEach(e=>{lines.push('  ['+ts(e.ts)+'] '+e.title);if(e.detail)lines.push('      '+e.detail.substring(0,100));});}}
  if(opts.all_responses){lines.push('  Responses: '+responses.length+(responses.length?'':' — none'));if(responses.length){responses.forEach(e=>{lines.push('  ['+ts(e.ts)+'] '+e.title);if(e.detail)lines.push('      '+e.detail.substring(0,100));});}}
  if(opts.tasks_done)lines.push('  Tasks completed: '+tasks.length);
  if(opts.scan_summary)lines.push('  Scans logged: '+scans.length);
  if(opts.checklist_status&&clKeys.length){lines.push('');lines.push('  Checklists:');clKeys.forEach(k=>{const l=S.checklists[k];const d=l.filter(x=>x.done).length;lines.push('  • '+k+': '+d+'/'+l.length+' done');});}
  if(opts.all_notes){const shiftNotes=S.notes.filter(n=>n.created>=since);if(shiftNotes.length){lines.push('');lines.push('  Notes ('+shiftNotes.length+'):');shiftNotes.forEach(n=>lines.push('  ['+ts(n.created)+'] '+n.title));}}

  if(extra){lines.push('');lines.push('  Notes for next operator:');lines.push('  '+extra);}
  lines.push('');
  lines.push('──────────────────────────────');
  lines.push('Generated: '+ts(now));
  return lines.join('\n');
}

function previewHandoff(){
  const text=buildHandoff();
  document.getElementById('handoff-content').textContent=text;
  openModal('modal-handoff');
}
function saveHandoffAsNote(){
  const text=buildHandoff();
  const now=new Date();
  closeModal('modal-handoff-cfg');
  // Reset shift start
  S.shiftStart=Date.now();
  save();
  newNote('Shift handoff — '+tsShort(now),text,'obs');
  showToast('Handoff saved as note','#2ecc8a');
}
function copyHandoff(){
  try{navigator.clipboard.writeText(document.getElementById('handoff-content').textContent);showToast('Copied!','#2ecc8a');}catch(e){showToast('Select & copy manually','#9199a8');}
}

// MODAL
function openModal(id){document.getElementById(id).classList.remove('hidden');}
function closeModal(id){document.getElementById(id).classList.add('hidden');}

// UTILS
function fireAlert(msg){
  showToast(msg,'#e85555');
  try{const ctx=new AudioContext();[880,660].forEach((f,i)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.frequency.value=f;g.gain.setValueAtTime(.25,ctx.currentTime+i*.15);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+i*.15+.4);o.start(ctx.currentTime+i*.15);o.stop(ctx.currentTime+i*.15+.4);});}catch(e){}
}
function showToast(msg,color){
  const t=document.getElementById('toast');t.textContent=msg;t.style.background=color||'var(--red)';
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function renderAll(){renderRec();renderAdhoc();renderCl();renderNotes();renderTemplates();updateTimerUI();renderSites();}

load();
